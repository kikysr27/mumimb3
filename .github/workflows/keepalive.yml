name: Keep Supabase Alive

# Ping Supabase otomatis tiap hari supaya project free TIDAK ke-pause,
# walau tidak ada yang membuka aplikasi (mis. libur sekolah 1 bulan).
#
# BONUS: workflow ini juga menulis catatan waktu kecil & commit ke repo
# setiap kali jalan. Itu membuat repo selalu "aktif", sehingga GitHub
# TIDAK akan menonaktifkan jadwal ini (normalnya jadwal mati kalau repo
# 60 hari tanpa aktivitas). Hasilnya: jalan terus, gratis, selamanya.

on:
  schedule:
    - cron: '0 3 * * *'   # tiap hari ~10:00 WIB
  workflow_dispatch:       # bisa dijalankan manual dari tab Actions

permissions:
  contents: write          # izin agar workflow boleh commit catatan waktu

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil repo
        uses: actions/checkout@v4

      - name: Ping Supabase + catat waktu
        run: |
          echo "Ping Supabase pada $(date -u)"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/anggota?select=id&limit=1&apikey=${SUPABASE_KEY}")
          echo "HTTP status: $code"
          if [ "$code" = "000" ]; then
            echo "Gagal konek ke Supabase (timeout/DNS)."; exit 1
          fi
          # Tulis catatan waktu — supaya ada perubahan untuk di-commit
          echo "Terakhir ping: $(date -u) (HTTP $code)" > keepalive-last.txt
          echo "Supabase tetap aktif"
        env:
          SUPABASE_URL: https://ksmdsvjpzyptcmhowcjq.supabase.co
          SUPABASE_KEY: sb_publishable_PqbtdOOyAdKlDqEhtTAMEA_229Ak1F8

      - name: Commit catatan waktu (jaga repo tetap aktif)
        run: |
          git config user.name  "keepalive-bot"
          git config user.email "actions@github.com"
          git add keepalive-last.txt
          # commit hanya kalau ada perubahan
          git diff --staged --quiet || git commit -m "keepalive: $(date -u)"
          git push
